defaults:
  - env/robotwin_adjust_bottle@env.train
  - env/robotwin_adjust_bottle@env.eval
  - model/pi0_5_rl_token@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor, env, rollout: 0-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_td3_openpi_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: 10
  save_interval: 10
  weight_sync_interval: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  gamma: 0.99
  tau: 0.005
  update_epoch: 1
  critic_actor_ratio: 2
  target_update_freq: 1
  target_policy_noise: 0.2
  target_noise_clip: 0.5
  bc_coef: 1.0

  rollout_epoch: 4
  eval_rollout_epoch: 1

  stage_actor_bc_only: False
  stage_freeze_actor: False

  actor_bc_guard:
    mode: "none"
    threshold: 0.004
    weighted_bc_coef: 50.0
    hard_penalty_coef: 5000.0
    hard_penalty_power: 1.0

  replay_buffer:
    enable_cache: True
    cache_size: 2000
    min_buffer_size: 256
    sample_window_size: 2000
    auto_save: False
    prefetch_size: 10

env:
  group_name: "EnvGroup"
  enable_offload: True
  train:
    total_num_envs: 256
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    group_size: 1
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    center_crop: False
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0
  eval:
    total_num_envs: 128
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    center_crop: False
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1
  collect_transitions: True
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 1234
  enable_offload: True

  model:
    model_path: "/shared_disk/users/weijie.ke/experiments/vla/pi05/openpi_torch/pi05_plug_cable"
    rl_token_path: "/shared_disk/users/weijie.ke/openpi_RLT/openpi/checkpoints/rl_token/pi05_plug_cable/rl_token_pi05_image/10000"
    num_action_chunks: 50
    action_dim: 14
    action_horizon: 50
    num_steps: 5
    openpi:
      config_name: "pi05_aloha_robotwin"
      num_images_in_input: 3
      noise_level: 0.3
      train_expert_only: True

  policy_head:
    enable_critic_q_upper_bound: True
    critic_q_upper_bound: 1.0
    actor_q_loss_clamp_to_upper_bound: True
    critic_target_clamp_to_upper_bound: True
    critic_overshoot_penalty_coef: 1.0

  optim:
    lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 0.01
    clip_grad: 1.0
    lr_scheduler: torch_constant

  critic_optim:
    lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 0.01
    clip_grad: 1.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
