# Piper 双臂 peg insertion + SAC Flow Matching（mixed 图像+状态）：单机异步 embodied（train_async.py）。
# 算法与超参对齐 realworld_sac_flow_image.yaml，环境栈为 Piper 真机（realworld_piper_peg_insertion），非 Franka 多机分置。
#
# 运行示例：
#   bash examples/embodiment/run_realworld_async.sh realworld_piper_peginsertion_sac_flow_2arms
#
# 状态维：RealWorldEnv 按 key 排序拼接 base_vel(2)+effort(14)+qpos(14)+qvel(14)=44

defaults:
  - env/realworld_piper_peg_insertion@env.train
  - env/realworld_piper_peg_insertion@env.eval
  - model/flow_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: piper_peginsertion_sac_flow_2arms
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 30
  group_size: 1
  normalize_advantages: False
  kl_penalty: kl
  enable_drq: False

  agg_q: min
  actor_agg_q: mean

  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1

  rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: standard

  gamma: 0.96
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    # 双臂 14 维动作，与 -action_dim/2 量级一致（同 Franka flow 真机注释习惯）
    target_entropy: -7
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  critic_actor_ratio: 4
  replay_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 2
    sample_window_size: 200
    auto_save: False

  demo_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 1
    sample_window_size: 200
    load_path: "/path/to/demo_data"
    auto_save: False

  num_updates_per_step: 64
  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    ignore_terminations: False
    total_num_envs: 1
    override_cfg:
      is_dummy: False
      joint_action_mode: delta
      delta_action_scale: 0.05
      enable_human_intervention: true
      camera_names:
        - cam_high
      img_topics:
        - /camera_f/color/image_raw
      obs_img_resolution: [128, 128]

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: true
      joint_action_mode: delta
      delta_action_scale: 0.05
      enable_human_intervention: false
      camera_names:
        - cam_high
      img_topics:
        - /camera_f/color/image_raw
      obs_img_resolution: [128, 128]

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  sync_weight_nccl_max_ctas: 32

  collect_transitions: true
  collect_prev_infos: false

  model:
    model_path: "/path/to/model" # https://huggingface.co/RLinf/RLinf-ResNet10-pretrained
    precision: ${actor.model.precision}
    num_q_heads: 10

  enable_torch_compile: true
  enable_cuda_graph: false

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 256
  global_batch_size: 256
  seed: 1234
  enable_offload: false

  model:
    model_type: "flow_policy"
    input_type: "mixed"

    model_path: "/path/to/model" # https://huggingface.co/RLinf/RLinf-ResNet10-pretrained

    state_dim: 44
    action_dim: 14
    image_size: [3, 128, 128]
    image_num: 1

    num_action_chunks: 1
    hidden_dim: 256

    precision: "32"
    add_value_head: False
    add_q_head: True
    num_q_heads: 10
    backbone: resnet

    denoising_steps: 4
    d_model: 256
    n_head: 4
    n_layers: 2
    use_batch_norm: False
    batch_norm_momentum: 0.99
    flow_actor_type: "JaxFlowTActor"
    noise_std_head: False
    log_std_min_train: -5
    log_std_max_train: 2
    log_std_min_rollout: -20
    log_std_max_rollout: 0
    noise_std_train: 0.3
    noise_std_rollout: 0.02

    is_lora: False
    lora_rank: 32
    ckpt_path: null
    gradient_checkpointing: False
    sharding_strategy: no_shard
    vh_mode: "q_network"
    q_network_separate_processing: True

    encoder_config:
      ckpt_name: "resnet10_pretrained.pt"

  optim:
    clip_grad: 1.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 1.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
