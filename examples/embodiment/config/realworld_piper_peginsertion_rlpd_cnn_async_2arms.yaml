# Piper 双臂 + RLPD CNN 异步 SAC（多机：GPU 节点与 Piper 节点分离）。关节增量 + 可选主臂人在回路。
# 若 Piper 与训练/推理同机，请用：realworld_piper_peginsertion_rlpd_cnn_2arms.yaml
# 运行示例：
#   bash examples/embodiment/run_realworld_async.sh realworld_piper_peginsertion_rlpd_cnn_async_2arms
#
# 状态维：RealWorldEnv 按 key 排序拼接 base_vel(2)+effort(14)+qpos(14)+qvel(14)=44

defaults:
  - env/realworld_piper_peg_insertion@env.train
  - env/realworld_piper_peg_insertion@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "4090"
      placement: 0
    env:
      node_group: piper
      placement: 0
    rollout:
      node_group: "4090"
      placement: 0
  node_groups:
    - label: "4090"
      node_ranks: 0
    - label: piper
      node_ranks: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: piper_peginsertion_rlpd_cnn
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: False

  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -7
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  critic_actor_ratio: 4
  replay_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 2
    sample_window_size: 200
    auto_save: False

  demo_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 1
    sample_window_size: 200
    load_path: "/home/focal/shared_disk/users/kwj/RLinf/logs/20260421-07:27:00/demos/"
    auto_save: False

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    ignore_terminations: False
    total_num_envs: 1
    override_cfg:
      is_dummy: False
      joint_action_mode: delta
      delta_action_scale: 0.05
      enable_human_intervention: true
      camera_names:
        - cam_high
      img_topics:
        - /camera_f/color/image_raw
      obs_img_resolution: [128, 128]

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: true
      joint_action_mode: delta
      delta_action_scale: 0.05
      enable_human_intervention: false
      camera_names:
        - cam_high
      img_topics:
        - /camera_f/color/image_raw
      obs_img_resolution: [128, 128]

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  sync_weight_nccl_max_ctas: 32

  collect_transitions: true
  collect_prev_infos: false

  model:
    model_path: "/home/focal/shared_disk/models/RLinf-ResNet10-pretrained"
    precision: ${actor.model.precision}
    num_q_heads: 10

  enable_torch_compile: true
  enable_cuda_graph: false

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 256
  global_batch_size: 256
  seed: 1234
  enable_offload: false

  model:
    model_type: "cnn_policy"
    model_path: "/home/focal/shared_disk/models/RLinf-ResNet10-pretrained"
    state_dim: 44
    action_dim: 14
    image_size: [3, 128, 128]
    num_q_heads: 10

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
