model_type: "openpi_rl_token"

model_path: "/path/to/model/openpi"
rl_token_path: null

precision: null

num_action_chunks: 50
action_dim: 14
num_steps: 5

is_lora: False
lora_rank: 32
use_proprio: True
add_value_head: False

# RL token autoencoder settings
rl_token_hidden_dim: 2048
rl_token_dim: 2048
rl_token_encoder_layers: 2
rl_token_decoder_layers: 2
rl_token_num_heads: 8
rl_token_max_seq_len: 768
rl_token_dropout: 0.1
# "image_only": only image tokens (num_images * 256) — matches rl_token training
# "full_prefix": all prefix tokens (image + language)
prefix_feature_type: "image_only"
num_image_tokens: 768
robot_state_dim: 14
actor_hidden_dims: [512, 256]
critic_hidden_dims: [512, 256]
recon_loss_coef: 0.1

openpi:
  config_name: "pi05_aloha_robotwin"
  num_images_in_input: 3
  noise_level: 0.3
  action_chunk: ${actor.model.num_action_chunks}
  num_steps: ${actor.model.num_steps}
  train_expert_only: True
  action_env_dim: ${actor.model.action_dim}
  noise_method: "flow_sde"
  add_value_head: False
  detach_critic_input: null
