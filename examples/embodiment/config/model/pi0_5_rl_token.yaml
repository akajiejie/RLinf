model_type: "openpi_rl_token"

# Pi05 backbone weights path (frozen during RL training)
model_path: "/path/to/model/openpi"

# RL token weights path (optional, for loading pre-trained RL token heads)
# If null, RL token heads are randomly initialized
rl_token_path: null  # e.g., "/path/to/rl_token_weights.pt"

precision: null

num_action_chunks: 10
action_dim: 7

is_lora: False
lora_rank: 32

use_proprio: True
num_steps: 5
add_value_head: False

# RL token autoencoder settings
rl_token_hidden_dim: 2048
rl_token_dim: 256
rl_token_encoder_layers: 2
rl_token_decoder_layers: 2
rl_token_num_heads: 8
rl_token_max_seq_len: 512
rl_token_dropout: 0.1
actor_hidden_dims: [512, 256]
critic_hidden_dims: [512, 256]
recon_loss_coef: 0.1

openpi:
  config_name: "pi05_libero"
  num_images_in_input: 2
  noise_level: 0.5
  action_chunk: ${actor.model.num_action_chunks}
  num_steps: ${actor.model.num_steps}
  train_expert_only: True
  action_env_dim: ${actor.model.action_dim}
  noise_method: "flow_sde"
  add_value_head: False
  detach_critic_input: null
