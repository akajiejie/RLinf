# Piper 双臂关节空间 + 增量动作：不使用 Franka 的 RelativeFrame / Quat2Euler / GripperClose。
# 在顶层 YAML 中设置 env.train.realworld_stack: piper_joint，并在 RealWorldEnv 中走 Piper 分支。

env_type: realworld

total_num_envs: null

auto_reset: True
ignore_terminations: True
reward_mode: raw
wrap_obs_mode: simple
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100
max_episode_steps: 100

# Franka 栈默认 True；Piper 关节增量需 False（避免 GripperCloseEnv 假定 7 维 EE 动作）
no_gripper: False
use_spacemouse: False

# Piper 双臂：主相机键名需与 PiperRobotConfig.camera_names 之一一致
main_image_key: cam_high

# franka | piper_joint — Piper 跳过 EE 系 RelativeFrame / Quat2Euler
realworld_stack: piper_joint

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  id: "PiperPegInsertionEnv-v1"
  num_envs: null
